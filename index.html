<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tieteellinen laskin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="calculator" role="application" aria-label="Tieteellinen laskin">
        <header class="calculator__header">
          <h1>Laskin</h1>
          <button
            type="button"
            class="mode-toggle"
            id="angleMode"
            aria-label="Vaihda asteet ja radiaanit"
          >
            DEG
          </button>
        </header>

        <div class="display" aria-live="polite" aria-atomic="true">
          <div class="display__expression" id="expression"></div>
          <div class="display__result" id="result">0</div>
        </div>

        <div class="keypad" id="keypad">
          <button class="key key--function" data-insert="(">(</button>
          <button class="key key--function" data-insert=")">)</button>
          <button class="key key--function" data-action="backspace" aria-label="Poista">⌫</button>
          <button class="key key--function" data-action="clear" aria-label="Tyhjennä">AC</button>
          <button class="key key--function" data-action="toggle-sign" aria-label="Etumerkki">±</button>

          <button class="key key--scientific" data-insert="sin(">sin</button>
          <button class="key key--scientific" data-insert="cos(">cos</button>
          <button class="key key--scientific" data-insert="tan(">tan</button>
          <button class="key key--scientific" data-insert="log(">log</button>
          <button class="key key--scientific" data-insert="ln(">ln</button>

          <button class="key key--scientific" data-action="square" aria-label="Neliö">x²</button>
          <button class="key key--scientific" data-insert="^" aria-label="Potenssi">x^y</button>
          <button class="key key--scientific" data-insert="sqrt(" aria-label="Neliöjuuri">√</button>
          <button class="key key--scientific" data-action="reciprocal" aria-label="Käänteisluku">1/x</button>
          <button class="key key--scientific" data-action="factorial" aria-label="Kertoma">n!</button>

          <button class="key key--digit" data-insert="7">7</button>
          <button class="key key--digit" data-insert="8">8</button>
          <button class="key key--digit" data-insert="9">9</button>
          <button class="key key--operator" data-insert="/" aria-label="Jako">÷</button>
          <button class="key key--constant" data-insert="pi" aria-label="Pii">π</button>

          <button class="key key--digit" data-insert="4">4</button>
          <button class="key key--digit" data-insert="5">5</button>
          <button class="key key--digit" data-insert="6">6</button>
          <button class="key key--operator" data-insert="*" aria-label="Kerto">×</button>
          <button class="key key--constant" data-insert="e" aria-label="Eulerin luku">e</button>

          <button class="key key--digit" data-insert="1">1</button>
          <button class="key key--digit" data-insert="2">2</button>
          <button class="key key--digit" data-insert="3">3</button>
          <button class="key key--operator" data-insert="-" aria-label="Vähennys">−</button>
          <button class="key key--scientific" data-insert="asin(">asin</button>

          <button class="key key--digit key--zero" data-insert="0">0</button>
          <button class="key key--digit" data-insert="." aria-label="Desimaali">,</button>
          <button class="key key--operator" data-insert="+" aria-label="Yhteenlasku">+</button>
          <button class="key key--equals" data-action="equals" aria-label="Laske">=</button>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
